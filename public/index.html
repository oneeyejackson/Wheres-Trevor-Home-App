<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Where's Trevor?</title><style>body{margin:0;background:#10130f;color:#f4f1e8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}main,.center{max-width:1100px;margin:auto;padding:24px}.center{min-height:100vh;display:grid;place-items:center}.card{background:#1b2118;border:1px solid #3b4435;border-radius:24px;padding:22px;margin:12px 0;box-shadow:0 20px 60px #0005}.grid{display:grid;grid-template-columns:1.3fr .7fr;gap:16px}h1{font-size:clamp(42px,8vw,88px);line-height:.9;margin:0 0 16px;letter-spacing:-.07em}.city{font-size:clamp(42px,10vw,112px);line-height:.88;letter-spacing:-.08em}.muted{color:#b9b6aa}.pill{display:inline-block;background:#d8b56d22;color:#f5d998;border:1px solid #d8b56d55;border-radius:999px;padding:8px 12px;font-weight:800}input,button{font:inherit;border-radius:14px;border:1px solid #ffffff26;padding:12px;margin:6px 0 12px}input{width:100%;box-sizing:border-box;background:#0f130d;color:#f4f1e8}button{background:#d8b56d;color:#1a1202;font-weight:800;cursor:pointer}.secondary{background:transparent;color:#f4f1e8}.danger{background:#ff9d8e}.row{display:flex;gap:10px;flex-wrap:wrap}.item{background:#0003;border:1px solid #fff1;border-radius:16px;padding:12px;margin:8px 0}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.err{color:#ff9d8e;font-weight:800}.clock{font-size:clamp(60px,18vw,180px);letter-spacing:-.09em;line-height:.85;margin:8vh 0 8px}.hidden{display:none}@media(max-width:850px){.grid,.two{grid-template-columns:1fr}main{padding:14px}}</style></head><body><div id="app"></div><script>let S={};const A=document.getElementById('app'),E=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])),api=async(p,o={})=>{o.credentials='same-origin';o.headers=o.headers||{};if(S.csrf)o.headers['x-wt-csrf']=S.csrf;let r=await fetch('/api/'+p,o),t=r.headers.get('content-type')||'',b=t.includes('json')?await r.json():await r.text();if(!r.ok)throw Error(b.error||b);return b},sh=h=>A.innerHTML=h,fd=f=>Object.fromEntries(new FormData(f)),fdate=d=>new Date(d+'T12:00:00').toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});async function boot(){try{let s=await api('status');S.session=s.session;S.csrf=s.session&&s.session.csrf;if(!s.setupComplete)return setup();if(!S.session)return login();if(S.session.role==='guest')return guest();dash()}catch(e){sh('<main><div class=card><p class=err>'+E(e.message)+'</p></div></main>')}}function setup(){sh('<div class=center><section class=card><h1>Where’s Trevor?</h1><p class=muted>One-time private setup. Trevor enters all usernames and passwords here.</p><form id=f><label>Setup code</label><input name=setupCode required><div class=two><div><label>Trevor admin username</label><input name=adminUsername required><label>Trevor admin password</label><input name=adminPassword type=password minlength=12 required></div><div><label>Andrea username</label><input name=viewerUsername required><label>Andrea password</label><input name=viewerPassword type=password minlength=12 required></div></div><div class=two><div><label>Guest username</label><input name=guestUsername value=guest required><label>Guest password</label><input name=guestPassword type=password minlength=12 required></div><div><label>Guest exit PIN</label><input name=guestExitPin inputmode=numeric required><label>Weather label</label><input name=weatherLabel value="Altadena, CA"></div></div><div class=two><input name=weatherLatitude value=34.1897><input name=weatherLongitude value=-118.1312></div><button>Create private app</button><p id=m class=err></p></form></section></div>');f.onsubmit=async e=>{e.preventDefault();try{await api('setup',{method:'POST',body:JSON.stringify(fd(f)),headers:{'content-type':'application/json'}});boot()}catch(x){m.textContent=x.message}}}function login(){sh('<div class=center><section class=card><h1>Where’s Trevor?</h1><form id=f><label>Username</label><input name=username required><label>Password</label><input name=password type=password required><button>Sign in</button><p id=m class=err></p></form></section></div>');f.onsubmit=async e=>{e.preventDefault();try{let r=await api('login',{method:'POST',body:JSON.stringify(fd(f)),headers:{'content-type':'application/json'}});S.session=r.session;S.csrf=r.session.csrf;r.session.role==='guest'?guest():dash()}catch(x){m.textContent=x.message}}}async function out(){await api('logout',{method:'POST'}).catch(()=>{});S={};boot()}async function guest(){let g;try{g=await api('guest')}catch(e){return login()}sh('<main><section class=card><div class=row><span class=pill>Guest mode</span><button class=secondary id=x>Exit guest</button></div><div id=clk class=clock></div><h2 id=dt></h2><p class=muted>'+E(g.weather.label||'Weather')+'</p><h2>'+E(g.weather.temperature||'—')+'°F</h2><p class=muted>Wind '+E(g.weather.wind||'—')+' mph · Humidity '+E(g.weather.humidity||'—')+'%</p><form id=pin class=hidden><label>Exit PIN</label><input name=pin inputmode=numeric><button>Unlock</button><p id=pm class=err></p></form></section></main>');let tick=()=>{let d=new Date;clk.textContent=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});dt.textContent=d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'})};tick();setInterval(tick,1000);x.onclick=()=>pin.classList.toggle('hidden');pin.onsubmit=async e=>{e.preventDefault();let r=await api('guest-pin',{method:'POST',body:JSON.stringify(fd(pin)),headers:{'content-type':'application/json'}});r.ok?out():pm.textContent='Wrong PIN'}}async function dash(){let d;try{d=await api('dashboard')}catch(e){return login()}let t=d.todayStop;sh('<main><div class=row><button class=secondary onclick=dash()>Refresh</button><button class=secondary onclick=out()>Sign out</button></div><h1>Where’s Trevor?</h1><div class=grid><section class=card><span class=pill>'+(t?E(t.type)+' day':'Setup ready')+'</span><div class=city>'+E(t?t.city:'Private dashboard')+'</div><p class=muted>'+E(t?[t.region,t.timezone].filter(Boolean).join(' · '):'Add private tour schedule in Netlify env vars.')+'</p><p>'+E(t?t.note:'Shared calendar and daysheets are protected behind login.')+'</p>'+(t&&t.cityFact?'<div class=item><b>Tiny city fact</b><br>'+E(t.cityFact)+'</div>':'')+'</section><section class=card><h2>Shared schedule today</h2>'+(d.sharedEvents.length?d.sharedEvents.map(e=>'<div class=item><b>'+E(e.time)+'</b><br>'+E(e.title)+'</div>').join(''):'<p class=muted>No shared calendar items today.</p>')+(d.calendarError?'<p class=err>'+E(d.calendarError)+'</p>':'')+'</section></div><div class=grid><section class=card><h2>Next few days</h2>'+(d.nextStops.length?d.nextStops.map(s=>'<div class=item><b>'+E(fdate(s.date))+'</b> · '+E(s.type)+'<br>'+E(s.city)+' '+E(s.region)+'</div>').join(''):'<p class=muted>No private tour stops configured yet.</p>')+'</section><section class=card><h2>Daysheets</h2>'+(d.daysheets.length?d.daysheets.map(s=>'<div class=item><b>'+E(fdate(s.date))+'</b><br><a target=_blank href="/api/daysheet?key='+encodeURIComponent(s.key)+'">'+E(s.filename)+'</a>'+(d.role==='admin'?'<br><button class=danger onclick="del(\''+E(s.key)+'\')">Delete</button>':'')+'</div>').join(''):'<p class=muted>No active daysheets.</p>')+(d.role==='admin'?'<form id=up><h2>Upload daysheet</h2><input name=date type=date required><input name=file type=file accept="application/pdf,image/*" required><button>Upload</button><p id=um class=err></p></form>':'')+'</section></div></main>');if(d.role==='admin')up.onsubmit=async e=>{e.preventDefault();try{await api('upload-daysheet',{method:'POST',body:new FormData(up)});dash()}catch(x){um.textContent=x.message}}}async function del(k){if(confirm('Delete this daysheet?')){await api('delete-daysheet',{method:'POST',body:JSON.stringify({key:k}),headers:{'content-type':'application/json'}});dash()}}window.dash=dash;window.out=out;window.del=del;boot()</script></body></html>
